<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Messenger - Безопасный мессенджер</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Login/Register Screen -->
        <div id="authScreen" class="screen">
            <div class="auth-container glass-morphism">
                <div class="auth-header">
                    <h1 class="logo">
                        <span class="logo-icon">🔐</span>
                        Secure Messenger
                    </h1>
                    <p class="auth-subtitle">Связь без границ</p>
                </div>
                
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Вход</button>
                    <button class="auth-tab" data-tab="register">Регистрация</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <input type="email" id="loginEmail" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="loginPassword" placeholder="Пароль" required>
                    </div>
                    <button type="submit" class="btn-primary">Войти</button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <input type="text" id="registerUsername" placeholder="Имя пользователя" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="registerEmail" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="registerDisplayName" placeholder="Отображаемое имя" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="registerPassword" placeholder="Пароль (мин. 8 символов)" required>
                    </div>
                    <button type="submit" class="btn-primary">Зарегистрироваться</button>
                </form>

                <div id="authError" class="error-message"></div>
            </div>
        </div>

        <!-- Main Messenger Screen -->
        <div id="messengerScreen" class="screen hidden">
            <!-- Sidebar -->
            <div class="sidebar glass-morphism">
                <div class="sidebar-header">
                    <div class="user-profile">
                        <img id="userAvatar" src="https://via.placeholder.com/40" alt="Avatar" class="avatar">
                        <div class="user-info">
                            <div id="userDisplayName" class="user-name">Пользователь</div>
                            <div class="user-status">
                                <span class="status-dot online"></span>
                                <span id="userStatusText">В сети</span>
                            </div>
                        </div>
                    </div>
                    <div class="sidebar-actions">
                        <button id="searchBtn" class="icon-btn" title="Поиск пользователей">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                        <button id="settingsBtn" class="icon-btn" title="Настройки">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M12 1v6m0 6v6m4.22-13.22l4.24 4.24M1.54 1.54l4.24 4.24M20.46 20.46l-4.24-4.24M1.54 20.46l4.24-4.24"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Search -->
                <div id="searchContainer" class="search-container hidden">
                    <input type="text" id="searchInput" placeholder="Поиск пользователей..." class="search-input">
                    <div id="searchResults" class="search-results"></div>
                </div>

                <!-- Conversations List -->
                <div class="conversations-list">
                    <div class="conversations-header">
                        <h3>Сообщения</h3>
                        <span id="unreadCount" class="unread-badge hidden">0</span>
                    </div>
                    <div id="conversationsList" class="conversations">
                        <!-- Conversations will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <!-- Chat Header -->
                <div id="chatHeader" class="chat-header glass-morphism hidden">
                    <div class="chat-header-info">
                        <img id="chatAvatar" src="https://via.placeholder.com/40" alt="Avatar" class="avatar">
                        <div class="chat-header-text">
                            <div id="chatName" class="chat-name">Выберите чат</div>
                            <div id="chatStatus" class="chat-status"></div>
                        </div>
                    </div>
                    <div class="chat-header-actions">
                        <button id="callBtn" class="icon-btn" title="Видеозвонок">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                            </svg>
                        </button>
                        <button id="videoCallBtn" class="icon-btn" title="Видеозвонок">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="23 7 16 12 23 17 23 7"></polygon>
                                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Messages Container -->
                <div id="messagesContainer" class="messages-container">
                    <div id="messagesList" class="messages-list">
                        <!-- Messages will be loaded here -->
                    </div>
                </div>

                <!-- Message Input -->
                <div id="messageInput" class="message-input glass-morphism hidden">
                    <button id="attachBtn" class="icon-btn" title="Прикрепить файл">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </button>
                    <input type="file" id="fileInput" accept="image/*,video/*,.pdf,.doc,.docx,.txt" style="display: none;">
                    <input type="text" id="messageTextInput" placeholder="Написать сообщение..." class="message-text-input">
                    <button id="sendBtn" class="icon-btn send-btn" title="Отправить">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Call Modal -->
        <div id="callModal" class="modal hidden">
            <div class="call-container glass-morphism">
                <div class="call-header">
                    <h3 id="callTitle">Видеозвонок</h3>
                    <button id="closeCallBtn" class="icon-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="call-content">
                    <video id="localVideo" autoplay muted class="video-local hidden"></video>
                    <video id="remoteVideo" autoplay class="video-remote hidden"></video>
                    <div id="callInfo" class="call-info">
                        <img id="callAvatar" src="https://via.placeholder.com/80" alt="Avatar" class="call-avatar">
                        <div id="callName" class="call-name">Пользователь</div>
                        <div id="callStatus" class="call-status">Соединение...</div>
                        <div id="callTimer" class="call-timer">00:00</div>
                    </div>
                </div>
                <div class="call-controls">
                    <button id="muteBtn" class="call-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </button>
                    <button id="videoBtn" class="call-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="23 7 16 12 23 17 23 7"></polygon>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                        </svg>
                    </button>
                    <button id="endCallBtn" class="call-btn end-call">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
        <div class="loading-text">Загрузка...</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
